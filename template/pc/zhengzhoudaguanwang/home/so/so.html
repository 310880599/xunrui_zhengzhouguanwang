<!DOCTYPE html>
<!--[if IE 8]> <html lang="zh-cn" class="ie8 no-js"> <![endif]-->
<!--[if IE 9]> <html lang="zh-cn" class="ie9 no-js"> <![endif]-->
<!--[if !IE]><!-->
<html lang="zh-cn">
<!--<![endif]-->
<head>
    <meta charset="utf-8" />
    <title>{$meta_title}</title>
    <meta content="{$meta_keywords}" name="keywords" />
    <meta content="{$meta_description}" name="description" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <!-- 主要css开始 -->
    <link href="{THEME_PATH}assets/icon/css/icon.css" rel="stylesheet" type="text/css" />
    <link href="{THEME_PATH}assets/global/css/pc.css" rel="stylesheet" type="text/css" />
    <!-- 主要css结束 -->
    <!-- 风格css开始 -->
    <link href="{THEME_PATH}default/web/css/style.css" rel="stylesheet" type="text/css" />
    <!-- 风格css结束 -->
    <!-- 系统关键js(所有自建模板必须引用) -->
    <script type="text/javascript">var is_mobile_cms = '{IS_MOBILE}';</script>
    <script src="{LANG_PATH}lang.js" type="text/javascript"></script>
    <script src="{THEME_PATH}assets/global/plugins/jquery.min.js" type="text/javascript"></script>
    <script src="{THEME_PATH}assets/js/cms.js" type="text/javascript"></script>
    <!-- 系统关键js结束 -->
    <script src="{THEME_PATH}assets/global/plugins/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="{THEME_PATH}default/web/scripts/app.min.js" type="text/javascript"></script>
    <script src="{THEME_PATH}assets/js/quick-sidebar.min.js" type="text/javascript"></script>
</head>
<body class="page-container-bg-solid">
<div class="page-wrapper">


<div class="page-wrapper-row full-height">
    <div class="page-wrapper-middle">
        <div class="page-head">
            <div class="container">
                <div class="page-title">
                    全站搜索插件，关键词：{$keyword}
                </div>
            </div>
        </div>
        <div class="page-content">

            <div class="container">


                <div class="search-page search-content-1">



                    <div class="portlet light">

                        <div class="portlet-body search-container ">
                            <ul>
                                {modules module=$mids field=title,url,thumb,description,keywords,updatetime LIKE_title=$keyword order=updatetime page=1 pagesize=10 urlrule=$urlrule}
                                <li class="search-item clearfix">
                                    <a title="{$t.title}" href="{$t.url}">
                                        <img src="{dr_thumb($t.thumb, 100, 90)}" width="100" height="90" style="margin-top: 15px;">
                                    </a>
                                    <div class="search-content text-left">
                                        <h4 class="search-title">
                                            <a title="{$t.title}" href="{$t.url}">{$t.title}</a>
                                        </h4>
                                        <p class="search-desc">{$t.description}</p>
                                        <div class="search-post-foot">

                                            <div class="search-post-meta">
                                                <i class="fa fa-calendar font-blue"></i>
                                                <a href="javascript:;">{$t.updatetime}</a>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                                {/modules} 
                            </ul>
                            {if !$count}
                            <div class="row fc-search-null" id="noResultsMessage">
                              <div class="col-md-12 text-center">
                                <i class="fa fa-close fc-search-null-icon"></i>
                                <label class="fc-search-null-txt">没有找到相关内容...</label>
                                <p>将在 <span id="countdown">3</span> 秒后返回上一页</p>
                              </div>
                            </div>
                            
                            <script>
                                function countdownAndGoBack() {
                                    var seconds = 3;
                                    var countdownElement = document.getElementById('countdown');
                                    var messageElement = document.getElementById('noResultsMessage');
                                
                                    function updateCountdown() {
                                        if (countdownElement) {
                                            countdownElement.textContent = seconds;
                                        }
                                        if (seconds > 0) {
                                            seconds--;
                                            setTimeout(updateCountdown, 1000);
                                        } else {
                                            // 使用 window.history.back() 代替 history.back()
                                            window.history.back();
                                            // 如果 3 秒后页面还没有跳转，我们强制跳转到首页
                                            setTimeout(function() {
                                                window.location.href = '/'; // 请替换为您的首页 URL
                                            }, 500);
                                        }
                                    }
                                
                                    if (messageElement) {
                                        messageElement.style.display = 'block';
                                        updateCountdown();
                                    }
                                }
                                
                                // 使用 window.onload 确保页面完全加载
                                window.onload = countdownAndGoBack;
                            </script>
                            {/if}
                            <div class="search-pagination">
                                <ul class="pagination">
                                    {$pages}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>
    <div class="page-wrapper-row">
        <div class="page-wrapper-bottom">

            <div class="scroll-to-top">
                <i class="fa fa-arrow-up"></i>
            </div>
        </div>
    </div>
</div>
</body>
</html>
